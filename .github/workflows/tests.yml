name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The suite exercises export parsing, the SQLite/FTS5 schema, and
      # helpers against synthetic fixtures: no Playwright, torch, or
      # network access needed.
      - run: pip install pytest
      - run: pytest
